<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Checker Builder (.mcworld + .mkcd)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1420;--surface:#16213e;--surface2:#1a2744;--surface3:#233158;
  --accent:#e94560;--accent2:#4dabf7;--text:#ecf0f1;--dim:#95a5a6;--muted:#6c7a89;
  --green:#2ecc71;--yellow:#f39c12;--red:#e74c3c;--border:rgba(255,255,255,.08);
}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
body{font-size:14px;line-height:1.5}
button{font-family:inherit}

.topbar{background:linear-gradient(135deg,var(--surface),var(--surface2));padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
.topbar h1{font-size:1.15rem;font-weight:700;letter-spacing:.3px;flex-shrink:0}
.topbar .subtitle{color:var(--dim);font-size:.8rem;flex:1;min-width:200px}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

.lang-switch{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.lang-switch button{background:transparent;border:none;color:var(--dim);padding:6px 10px;font-size:.78rem;font-weight:600;cursor:pointer;letter-spacing:.5px}
.lang-switch button.active{background:var(--accent2);color:#fff}
.lang-switch button:not(.active):hover{background:var(--surface2);color:var(--text)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface3);color:var(--text);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent2);background:var(--surface2)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.btn-primary:hover{filter:brightness(1.15);background:var(--accent)}
.btn-ghost{background:transparent}
.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-danger{color:var(--red);border-color:transparent;background:transparent}
.btn-danger:hover{background:rgba(231,76,60,.1);border-color:rgba(231,76,60,.3)}

.lesson-meta{background:var(--surface);padding:14px 24px;border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:4px;min-width:180px}
.field.flex-grow{flex:1}
.field label{font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;color:var(--dim)}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.88rem;outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:60px}
.field small{color:var(--muted);font-size:.72rem}

.main{display:grid;grid-template-columns:minmax(340px,1fr) minmax(440px,1.4fr);gap:0;align-items:start}
@media (max-width:1100px){.main{grid-template-columns:1fr}}

.pane{padding:20px 24px}
.pane-catalog{background:var(--surface);border-right:1px solid var(--border)}
@media (max-width:1100px){.pane-catalog{border-right:none;border-bottom:1px solid var(--border)}}
.pane-builder{background:var(--bg)}

.pane h2{font-size:.78rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin-bottom:12px;font-weight:600}
.pane-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;flex-wrap:wrap}
.pane-title-row h2{margin-bottom:0}

.category-section{margin-bottom:6px}
.section-header{display:flex;align-items:baseline;gap:10px;padding:12px 4px 6px;border-bottom:1px solid var(--border);margin:6px 0 14px}
.section-header .sh-icon{font-size:1rem;flex-shrink:0}
.section-header .sh-title{font-size:.78rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.section-header .sh-sub{font-size:.7rem;color:var(--dim);font-family:Consolas,monospace;letter-spacing:.4px;margin-left:auto}
.category-section[data-section="world"] .section-header{border-bottom-color:rgba(77,171,247,.35)}
.category-section[data-section="world"] .sh-title{color:#7cc4ff}
.category-section[data-section="code"] .section-header{border-bottom-color:rgba(243,156,18,.4)}
.category-section[data-section="code"] .sh-title{color:#f5b041}
.category-group{margin-bottom:18px}
.category-header{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:6px;margin-bottom:6px;cursor:pointer;user-select:none}
.category-header:hover{background:var(--surface3)}
.category-header .cat-icon{font-size:1.1rem}
.category-header .cat-name{font-weight:600;font-size:.9rem;flex:1}
.category-header .cat-count{font-size:.72rem;color:var(--dim);background:var(--bg);padding:2px 8px;border-radius:10px}
.category-header .chevron{transition:transform .15s;color:var(--dim)}
.category-group.collapsed .chevron{transform:rotate(-90deg)}
.category-group.collapsed .category-items{display:none}

.catalog-item{padding:10px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all .15s;background:var(--bg)}
.catalog-item:hover{border-color:var(--accent2);background:var(--surface2)}
.catalog-item .ci-title{font-weight:500;font-size:.88rem;margin-bottom:3px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.catalog-item .ci-desc{font-size:.78rem;color:var(--dim);line-height:1.45}
.catalog-item .ci-add{color:var(--accent2);font-size:.78rem;font-weight:600;flex-shrink:0}

.empty-builder{text-align:center;padding:40px 20px;color:var(--dim);border:2px dashed var(--border);border-radius:10px}
.empty-builder .icon{font-size:2rem;margin-bottom:10px;display:block;opacity:.6}

.check-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.check-card-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.check-card-header:hover{background:var(--surface2)}
.check-card-header .ch-title{flex:1;font-weight:500;font-size:.92rem}
.check-card-header .ch-type{font-size:.7rem;color:var(--dim);font-family:ui-monospace,monospace}
.check-card-header .ch-target{display:inline-flex;align-items:center;gap:3px;font-size:.7rem;font-weight:600;padding:2px 7px;border-radius:10px;letter-spacing:.3px;flex-shrink:0}
.check-card-header .ch-target.world{background:rgba(77,171,247,.15);color:#7cc4ff;border:1px solid rgba(77,171,247,.3)}
.check-card-header .ch-target.code{background:rgba(243,156,18,.12);color:#f5b041;border:1px solid rgba(243,156,18,.3)}
.check-card-body{padding:14px;border-top:1px solid var(--border);background:var(--bg);display:none}
.check-card.open .check-card-body{display:block}
.check-card.open .chevron-c{transform:rotate(90deg)}
.chevron-c{transition:transform .15s;color:var(--dim)}

.param-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.param-row .field{min-width:0}
@media (max-width:600px){.param-row{grid-template-columns:1fr}}

.preview-banner{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-top:20px}
.preview-requires{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:.78rem;color:var(--dim);margin-bottom:12px;padding:8px 10px;background:var(--bg);border-radius:6px}
.preview-requires .pr-label{font-weight:500}
.preview-requires .pr-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:.74rem;font-weight:600}
.preview-requires .pr-badge.world{background:rgba(77,171,247,.15);color:#7cc4ff}
.preview-requires .pr-badge.code{background:rgba(243,156,18,.12);color:#f5b041}
.preview-requires .pr-badge .pr-count{opacity:.7;margin-left:2px}
.preview-banner h3{font-size:.78rem;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:10px}
.preview-list{display:flex;flex-direction:column;gap:6px}
.preview-item{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;background:var(--bg);border-radius:5px;font-size:.85rem}
.preview-item .dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0;margin-top:5px}
.preview-item .pi-body{flex:1}
.preview-item .pi-hint{font-size:.76rem;color:var(--dim);margin-top:3px;line-height:1.45}

.toast{position:fixed;bottom:20px;right:20px;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:.88rem;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:1000;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.success{border-color:var(--green)}

.hint{font-size:.76rem;color:var(--muted);margin-top:4px;line-height:1.45}
.hint strong{color:var(--dim)}

.help-icon{display:inline-flex;width:15px;height:15px;border-radius:50%;background:var(--surface3);color:var(--dim);font-size:.7rem;align-items:center;justify-content:center;font-weight:700;cursor:help;margin-left:6px}

.param-hint{font-size:.75rem;color:var(--dim);line-height:1.45;background:var(--surface2);border-left:3px solid var(--accent2);padding:8px 10px;margin:10px 0;border-radius:0 4px 4px 0}

.presets-hint{font-size:.78rem;color:var(--dim);padding:8px 10px;background:var(--surface2);border-radius:5px;margin-bottom:14px}

/* ========== ONBOARDING TOUR ========== */
.tour-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;opacity:0;pointer-events:none;transition:opacity .2s}
.tour-backdrop.active{opacity:1}
.tour-spotlight{position:fixed;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.55),0 0 0 3px var(--accent2);transition:left .2s ease,top .2s ease,width .2s ease,height .2s ease;pointer-events:none;z-index:9050}
.tour-popover{position:fixed;background:var(--surface);border:1px solid var(--accent2);border-radius:10px;padding:18px 20px;width:340px;max-width:calc(100vw - 32px);z-index:9100;box-shadow:0 12px 40px rgba(0,0,0,.5);transition:left .2s ease,top .2s ease}
.tour-popover h3{font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.tour-popover p{font-size:.86rem;color:var(--text);line-height:1.5;margin-bottom:14px}
.tour-popover .tour-nav{display:flex;justify-content:space-between;align-items:center;gap:10px}
.tour-popover .tour-counter{font-size:.75rem;color:var(--dim)}
.tour-popover .tour-buttons{display:flex;gap:8px}
.tour-popover .tour-arrow{position:absolute;width:0;height:0;border-style:solid}
.tour-popover.arrow-top .tour-arrow{top:-8px;left:24px;border-width:0 8px 8px 8px;border-color:transparent transparent var(--accent2) transparent}
.tour-popover.arrow-bottom .tour-arrow{bottom:-8px;left:24px;border-width:8px 8px 0 8px;border-color:var(--accent2) transparent transparent transparent}
.tour-popover.arrow-left .tour-arrow{left:-8px;top:24px;border-width:8px 8px 8px 0;border-color:transparent var(--accent2) transparent transparent}
.tour-popover.arrow-right .tour-arrow{right:-8px;top:24px;border-width:8px 0 8px 8px;border-color:transparent transparent transparent var(--accent2)}

.btn-tour{background:linear-gradient(135deg,#4dabf7,#3690d8);border-color:#3690d8;color:#fff;font-weight:600}
.btn-tour:hover{filter:brightness(1.1);background:linear-gradient(135deg,#4dabf7,#3690d8)}

.tour-pulse{animation:tourPulse 1.4s ease-in-out infinite}
@keyframes tourPulse{0%,100%{box-shadow:0 0 0 9999px rgba(0,0,0,.55),0 0 0 3px var(--accent2)}50%{box-shadow:0 0 0 9999px rgba(0,0,0,.55),0 0 0 6px var(--accent)}}

/* ========== HELP / CHEATSHEET MODAL ========== */
.help-overlay{position:fixed;inset:0;background:rgba(10,15,30,.78);display:flex;align-items:center;justify-content:center;z-index:8000;padding:30px 20px;opacity:0;pointer-events:none;transition:opacity .2s}
.help-overlay.active{opacity:1;pointer-events:auto}
.help-modal{background:var(--bg);border:1px solid var(--border);border-radius:12px;width:100%;max-width:920px;max-height:90vh;overflow:auto;padding:0;position:relative}
.help-header{position:sticky;top:0;background:linear-gradient(135deg,var(--surface),var(--surface2));padding:18px 28px;border-bottom:1px solid var(--border);z-index:2;display:flex;align-items:center;gap:14px}
.help-header h2{font-size:1.15rem;font-weight:700;flex:1}
.help-header .help-close{background:transparent;border:1px solid var(--border);color:var(--dim);padding:6px 12px;border-radius:6px;font-size:.95rem;cursor:pointer}
.help-header .help-close:hover{color:var(--text);border-color:var(--accent2)}
.help-header .help-print{background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:.85rem;font-weight:500;cursor:pointer}
.help-header .help-print:hover{border-color:var(--accent2)}

.help-body{padding:24px 28px}
.help-section{margin-bottom:32px}
.help-section h3{font-size:.85rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent2);padding-bottom:8px;border-bottom:1px solid rgba(77,171,247,.3);margin-bottom:14px}

.recipes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.recipe-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.recipe-card .recipe-head{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.recipe-card .recipe-icon{font-size:1.1rem}
.recipe-card .recipe-title{font-weight:600;font-size:.95rem;flex:1}
.recipe-card .recipe-tag{font-size:.7rem;color:var(--dim);font-family:Consolas,monospace}
.recipe-card .recipe-checks{display:flex;flex-direction:column;gap:3px;font-size:.78rem;color:var(--text);font-family:Consolas,'Cascadia Mono',monospace;line-height:1.6}
.recipe-card .recipe-checks .rc-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.66rem;margin-right:6px;font-family:inherit;font-weight:600}
.recipe-card .recipe-checks .rc-tag.world{background:rgba(77,171,247,.15);color:#7cc4ff}
.recipe-card .recipe-checks .rc-tag.code{background:rgba(243,156,18,.12);color:#f5b041}

.file-diagram{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.file-diagram{grid-template-columns:1fr}}
.file-card{padding:18px 16px;border-radius:10px;text-align:center}
.file-card.world{background:rgba(77,171,247,.08);border:1px solid rgba(77,171,247,.3)}
.file-card.code {background:rgba(243,156,18,.07);border:1px solid rgba(243,156,18,.3)}
.file-card .fc-icon{font-size:2rem}
.file-card .fc-ext {font-family:Consolas,monospace;font-size:.85rem;color:var(--dim);margin-top:2px}
.file-card .fc-title{font-weight:600;font-size:1rem;margin-top:6px}
.file-card .fc-desc{font-size:.82rem;color:var(--dim);margin-top:6px;line-height:1.5}
.file-card .fc-count{display:inline-block;margin-top:10px;padding:3px 12px;background:var(--bg);border-radius:14px;font-size:.78rem;font-weight:600}

.checks-list-cat{margin-bottom:18px}
.checks-list-cat h4{font-size:.78rem;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:8px;font-weight:600}
.checks-list-rows{display:grid;grid-template-columns:1fr;gap:2px}
.check-row{display:grid;grid-template-columns:14px 220px 1fr;align-items:baseline;gap:10px;padding:5px 8px;border-radius:4px;font-size:.83rem}
.check-row:hover{background:var(--surface2)}
.check-row .cr-mark{color:var(--green);font-weight:700;text-align:center}
.check-row .cr-id{font-family:Consolas,'Cascadia Mono',monospace;color:var(--accent2);font-size:.78rem}
.check-row .cr-desc{color:var(--text);line-height:1.4}
@media(max-width:600px){.check-row{grid-template-columns:1fr;gap:2px}.check-row .cr-mark{display:none}}

@media print{
  body > :not(.help-overlay){display:none !important}
  .help-overlay{position:static;background:none;display:block;padding:0;opacity:1}
  .help-modal{max-width:none;max-height:none;border:none;background:#fff;color:#000}
  .help-modal *{color:#000 !important;background:#fff !important;border-color:#999 !important;text-shadow:none !important}
  .help-header{position:static;border-bottom:2px solid #000}
  .help-print,.help-close{display:none !important}
  .recipe-card,.file-card,.checks-list-cat{break-inside:avoid;page-break-inside:avoid}
  .help-section{page-break-after:auto}
  a{color:#000 !important;text-decoration:none}
}
</style>
</head>
<body>

<div class="topbar">
  <h1 id="appTitle"></h1>
  <div class="subtitle" id="appSubtitle"></div>
  <div class="topbar-actions">
    <div class="lang-switch" id="langSwitch">
      <button data-lang="es">ES</button>
      <button data-lang="ru">RU</button>
      <button data-lang="en">EN</button>
    </div>
    <button class="btn btn-tour" id="btnTour" title="">🎓 <span data-t="btn.tour"></span></button>
    <button class="btn" id="btnHelp" title="">📋 <span data-t="btn.help"></span></button>
    <button class="btn" id="btnLoadPreset"></button>
    <button class="btn" id="btnImport"></button>
    <button class="btn" id="btnExportJson"></button>
    <button class="btn btn-primary" id="btnExportZip"></button>
  </div>
</div>

<div class="lesson-meta">
  <div class="field" style="min-width:140px" id="field-lessonId">
    <label><span data-t="field.lessonId"></span> <span class="help-icon" data-t-attr="title:field.lessonId.help">?</span></label>
    <input type="text" id="lessonId" value="M1L3" placeholder="M1L3" maxlength="20">
  </div>
  <div class="field flex-grow" id="field-lessonName">
    <label data-t="field.lessonName"></label>
    <input type="text" id="lessonName" data-t-attr="placeholder:field.lessonName.placeholder">
  </div>
  <div class="field flex-grow" id="field-lessonIntro">
    <label><span data-t="field.lessonIntro"></span> <span class="help-icon" data-t-attr="title:field.lessonIntro.help">?</span></label>
    <input type="text" id="lessonIntro">
  </div>
</div>

<div class="main">
  <aside class="pane pane-catalog">
    <div class="pane-title-row">
      <h2 id="catalogTitle"></h2>
    </div>
    <div class="presets-hint" id="catalogIntro"></div>
    <div id="catalogRoot"></div>
  </aside>

  <div class="pane pane-builder">
    <div class="pane-title-row">
      <h2><span id="builderTitle"></span> (<span id="checkCount">0</span>)</h2>
      <button class="btn btn-sm btn-ghost" id="btnClearAll"></button>
    </div>

    <div id="builderRoot"></div>

    <div class="preview-banner" id="previewBanner">
      <h3 id="previewTitle"></h3>
      <div id="previewRequires" class="preview-requires" style="display:none"></div>
      <div id="previewRoot" class="preview-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileImport" accept=".json" style="display:none">

<!-- ============================================================ -->
<!-- HELP / CHEATSHEET MODAL                                      -->
<!-- ============================================================ -->
<div class="help-overlay" id="helpOverlay">
  <div class="help-modal">
    <div class="help-header">
      <h2 id="helpTitle">📋 Справочник</h2>
      <button class="help-print" id="helpPrintBtn">🖨 <span data-t="help.print"></span></button>
      <button class="help-close" id="helpCloseBtn"><span data-t="help.close"></span></button>
    </div>
    <div class="help-body" id="helpBody"></div>
  </div>
</div>

<!-- Tour overlay -->
<div class="tour-backdrop" id="tourBackdrop"></div>
<div class="tour-spotlight" id="tourSpotlight" style="display:none"></div>
<div class="tour-popover" id="tourPopover" style="display:none">
  <span class="tour-arrow"></span>
  <h3 id="tourTitle"></h3>
  <p id="tourBody"></p>
  <div class="tour-nav">
    <span class="tour-counter" id="tourCounter"></span>
    <div class="tour-buttons">
      <button class="btn btn-sm btn-ghost" id="tourSkip"></button>
      <button class="btn btn-sm" id="tourPrev"></button>
      <button class="btn btn-sm btn-primary" id="tourNext"></button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- CHECKER TEMPLATE — full FrameBox checker, rendered into ZIP  -->
<!-- ============================================================ -->
<script type="text/plain" id="checkerTemplate"><!DOCTYPE html>
<html lang="__LANG__">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__LESSON_NAME__</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"><\/script>
<script src="https://unpkg.com/lzma@2.3.0/src/lzma_worker-min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/acorn/8.11.3/acorn.min.js"><\/script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--accent:#e94560;--text:#ecf0f1;--dim:#95a5a6;--green:#2ecc71;--yellow:#f39c12;--red:#e74c3c;--surface2:#1a2744}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{text-align:center;padding:24px 16px 12px;background:linear-gradient(135deg,var(--surface),var(--surface2))}
.header h1{font-size:1.6rem;font-weight:700;letter-spacing:.5px}
.header p{color:var(--dim);font-size:.85rem;margin-top:4px}
.container{max-width:960px;margin:0 auto;padding:16px}
.form-card{background:var(--surface);border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,.06)}
.req-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(77,171,247,.08);border:1px solid rgba(77,171,247,.25);border-radius:8px;margin-bottom:14px;font-size:.85rem;color:var(--text);flex-wrap:wrap}
.req-banner .req-icon{font-size:1.05rem}
.req-banner .req-badges{display:inline-flex;gap:6px;flex-wrap:wrap}
.req-banner .req-badge{background:var(--surface);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:2px 10px;font-size:.78rem;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.drop-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
.drop-grid.dual{grid-template-columns:1fr 1fr}
@media(max-width:680px){.drop-grid.dual{grid-template-columns:1fr}}
.drop-slot{position:relative;background:rgba(255,255,255,.02);border:2px dashed rgba(255,255,255,.18);border-radius:10px;padding:18px 14px;text-align:center;cursor:pointer;transition:all .2s;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.drop-slot:hover,.drop-slot.dragover{border-color:var(--accent);background:rgba(233,69,96,.06)}
.drop-slot.loaded{border-style:solid;border-color:rgba(46,204,113,.6);background:rgba(46,204,113,.06)}
.drop-slot.error{border-color:rgba(231,76,60,.6);background:rgba(231,76,60,.06)}
.drop-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:1}
.drop-slot .slot-icon{font-size:1.6rem}
.drop-slot .slot-title{font-weight:600;font-size:.95rem;margin-top:2px}
.drop-slot .slot-ext{font-size:.72rem;color:var(--dim);font-family:Consolas,Monaco,monospace;letter-spacing:.5px}
.drop-slot .slot-status{font-size:.78rem;color:var(--dim);margin-top:6px;word-break:break-all;max-width:100%}
.drop-slot.loaded .slot-status{color:#62d490}
.drop-slot .slot-clear{position:absolute;top:6px;right:6px;background:transparent;border:none;color:var(--dim);font-size:1.05rem;cursor:pointer;padding:4px 8px;border-radius:4px;z-index:2;line-height:1}
.drop-slot .slot-clear:hover{color:var(--red);background:rgba(231,76,60,.12)}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--surface);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.06);display:flex;gap:12px;align-items:flex-start}
.card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.card-thumb{width:56px;height:56px;border-radius:6px;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;overflow:hidden}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-body{flex:1;min-width:0}
.card-name{font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-lesson{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.card-dots{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%}
.dot.pass{background:var(--green)}.dot.fail{background:var(--red)}
.card-score{font-size:.8rem;color:var(--dim);margin-top:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:14px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;position:relative;border:1px solid rgba(255,255,255,.08)}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--dim);font-size:1.4rem;cursor:pointer;line-height:1}
.modal h2{font-size:1.15rem;margin-bottom:4px}
.modal .lesson-tag{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.modal-section{margin-top:16px}
.modal-section h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.06)}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.meta-item{font-size:.85rem}.meta-item span{color:var(--dim)}
.checklist-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;font-size:.88rem}
.check-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;color:#fff;font-weight:700;margin-top:2px}
.check-icon.pass{background:var(--green)}.check-icon.fail{background:var(--red)}
.checklist-item .hint{font-size:.76rem;color:var(--dim);margin-top:2px;line-height:1.45}
.npc-card{background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px}
.npc-card .npc-name{font-weight:600;font-size:.92rem}
.npc-card .npc-pos{font-size:.75rem;color:var(--dim);margin-top:2px}
.npc-card .npc-dialogue{margin-top:6px;padding:8px;background:var(--surface2);border-radius:6px;font-size:.85rem;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.npc-card .npc-buttons{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.npc-btn-tag{font-size:.75rem;padding:3px 8px;border-radius:4px;background:rgba(233,69,96,.15);color:var(--accent)}
.modal-thumb{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:12px}
.mc-bold{font-weight:700}.mc-italic{font-style:italic}.mc-obfuscated{animation:obf .1s infinite}
@keyframes obf{0%{opacity:.8}50%{opacity:.2}100%{opacity:.8}}
.mc-0{color:#000}.mc-1{color:#00a}.mc-2{color:#0a0}.mc-3{color:#0aa}.mc-4{color:#a00}.mc-5{color:#a0a}.mc-6{color:#fa0}.mc-7{color:#aaa}
.mc-8{color:#555}.mc-9{color:#55f}.mc-a{color:#5f5}.mc-b{color:#5ff}.mc-c{color:#f55}.mc-d{color:#f5f}.mc-e{color:#ff5}.mc-f{color:#fff}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);border-radius:8px;padding:10px 14px;color:var(--red);font-size:.85rem;margin-bottom:12px;display:none}
</style>
</head>
<body>
<div class="header">
  <h1 id="lessonTitle">__LESSON_NAME__</h1>
  <p id="lessonIntro">__LESSON_INTRO__</p>
</div>
<div class="container">
  <div class="form-card">
    <div class="req-banner" id="reqBanner" style="display:none">
      <span class="req-icon">📋</span>
      <span id="reqLabel"></span>
      <span class="req-badges" id="reqBadges"></span>
    </div>
    <div class="drop-grid" id="dropGrid">
      <div class="drop-slot" data-target="world" id="slotWorld" style="display:none">
        <input type="file" accept=".mcworld" data-target="world">
        <button type="button" class="slot-clear" data-target="world" hidden>✕</button>
        <div class="slot-icon">🌍</div>
        <div class="slot-title" id="slotWorldTitle">__SLOT_WORLD_TITLE__</div>
        <div class="slot-ext">.mcworld</div>
        <div class="slot-status" id="slotWorldStatus">__SLOT_WORLD_EMPTY__</div>
      </div>
      <div class="drop-slot" data-target="code" id="slotCode" style="display:none">
        <input type="file" accept=".mkcd" data-target="code">
        <button type="button" class="slot-clear" data-target="code" hidden>✕</button>
        <div class="slot-icon">💻</div>
        <div class="slot-title" id="slotCodeTitle">__SLOT_CODE_TITLE__</div>
        <div class="slot-ext">.mkcd</div>
        <div class="slot-status" id="slotCodeStatus">__SLOT_CODE_EMPTY__</div>
      </div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div id="spinnerWrap" style="display:none;text-align:center;padding:12px">
      <span class="spinner"></span>
      <span style="color:var(--dim);margin-left:8px;font-size:.85rem" id="analyzingText">__ANALYZING__</span>
    </div>
  </div>
  <div id="resultsSection" style="display:none"><div class="results-grid" id="resultsGrid"></div></div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"><button class="modal-close" id="modalClose">&times;</button></div></div>

<!-- LevelDB reader -->
<script>
(function(){
const MAGIC=new Uint8Array([0x57,0xfb,0x80,0x8b,0x24,0x75,0x47,0xdb]);
const FOOTER_SIZE=48;
function readVarint(b,o){let r=0,s=0,p=o;while(p<b.length){const x=b[p++];r|=(x&0x7f)<<s;if((x&0x80)===0)break;s+=7;if(s>=35)break}return{value:r>>>0,bytesRead:p-o}}
function readBlockHandle(b,o){const f=readVarint(b,o),z=readVarint(b,o+f.bytesRead);return{offset:f.value,size:z.value,bytesRead:f.bytesRead+z.bytesRead}}
function readFooter(b){if(b.length<FOOTER_SIZE)throw new Error('File too small');const fs=b.length-FOOTER_SIZE,f=b.subarray(fs);for(let i=0;i<8;i++)if(f[40+i]!==MAGIC[i])throw new Error('Invalid LevelDB magic');const m=readBlockHandle(f,0),x=readBlockHandle(f,m.bytesRead);return{metaindex:m,index:x}}
function readRawBlock(fd,h){const bs=h.offset,d=fd.subarray(bs,bs+h.size),t=fd[bs+h.size];if(t===0)return d;if(t===2||t===4){try{return pako.inflateRaw(d)}catch{try{return pako.inflate(d)}catch(e){throw new Error('Decomp failed ('+t+')')}}}if(t===3){try{return pako.inflate(d)}catch{try{return pako.inflateRaw(d)}catch(e){throw new Error('Decomp failed (3)')}}}return d}
function parseBlockEntries(bd){const e=[],v=new DataView(bd.buffer,bd.byteOffset,bd.byteLength),nr=v.getUint32(bd.length-4,true),rs=bd.length-4-(nr*4);let p=0,pk=new Uint8Array(0);while(p<rs){const sh=readVarint(bd,p);p+=sh.bytesRead;const un=readVarint(bd,p);p+=un.bytesRead;const vl=readVarint(bd,p);p+=vl.bytesRead;const kd=bd.subarray(p,p+un.value);p+=un.value;const fk=new Uint8Array(sh.value+un.value);if(sh.value>0)fk.set(pk.subarray(0,sh.value));fk.set(kd,sh.value);const vv=bd.subarray(p,p+vl.value);p+=vl.value;e.push({key:fk,value:new Uint8Array(vv)});pk=fk}return e}
function parseIndexEntries(id){return parseBlockEntries(id).map(e=>({key:e.key,blockHandle:readBlockHandle(e.value,0)}))}
function readLdbFile(fd){const f=readFooter(fd),ib=readRawBlock(fd,f.index),ie=parseIndexEntries(ib),ae=[];for(const x of ie){try{const db=readRawBlock(fd,x.blockHandle);ae.push(...parseBlockEntries(db))}catch{}}return ae}
const LBS=32768,LF=1,L1=2,LM=3,LL=4;
function readLogFile(fd){const e=[];let p=0,pd=null;while(p+7<=fd.length){const bo=p%LBS;if(bo+7>LBS){p+=LBS-bo;continue}const v=new DataView(fd.buffer,fd.byteOffset+p,7),l=v.getUint16(4,true),t=v.getUint8(6);p+=7;if(l===0&&t===0){p+=LBS-(p%LBS);continue}if(p+l>fd.length)break;const d=fd.subarray(p,p+l);p+=l;if(t===LF)parseLogBatch(d,e);else if(t===L1)pd=new Uint8Array(d);else if(t===LM&&pd){const m=new Uint8Array(pd.length+d.length);m.set(pd);m.set(d,pd.length);pd=m}else if(t===LL&&pd){const m=new Uint8Array(pd.length+d.length);m.set(pd);m.set(d,pd.length);parseLogBatch(m,e);pd=null}}return e}
function parseLogBatch(bd,e){if(bd.length<12)return;const v=new DataView(bd.buffer,bd.byteOffset,bd.byteLength),c=v.getUint32(8,true);let p=12;for(let i=0;i<c&&p<bd.length;i++){const t=bd[p++],kl=readVarint(bd,p);p+=kl.bytesRead;if(p+kl.value>bd.length)break;const k=bd.subarray(p,p+kl.value);p+=kl.value;if(t===1){const vl=readVarint(bd,p);p+=vl.bytesRead;if(p+vl.value>bd.length)break;const vv=bd.subarray(p,p+vl.value);p+=vl.value;e.push({key:new Uint8Array(k),value:new Uint8Array(vv)})}}}
function readLevelDB(files){const ae=[];for(const[n,d]of Object.entries(files)){if(n.endsWith('.ldb')||n.endsWith('.sst')){try{ae.push(...readLdbFile(d))}catch(e){}}}for(const[n,d]of Object.entries(files)){if(n.endsWith('.log')){try{ae.push(...readLogFile(d))}catch(e){}}}return ae}
window.LevelDBReader={readLevelDB,readLdbFile,readLogFile};
})();
<\/script>
<!-- NBT parser (Bedrock little-endian) -->
<script>
(function(){
const TAG={END:0,BYTE:1,SHORT:2,INT:3,LONG:4,FLOAT:5,DOUBLE:6,BYTE_ARRAY:7,STRING:8,LIST:9,COMPOUND:10,INT_ARRAY:11,LONG_ARRAY:12};
class NBTReader{
  constructor(b){this.buf=b instanceof Uint8Array?b:new Uint8Array(b);this.view=new DataView(this.buf.buffer,this.buf.byteOffset,this.buf.byteLength);this.pos=0}
  byte(){return this.view.getInt8(this.pos++)} ubyte(){return this.view.getUint8(this.pos++)}
  short(){const v=this.view.getInt16(this.pos,true);this.pos+=2;return v}
  int(){const v=this.view.getInt32(this.pos,true);this.pos+=4;return v}
  long(){const lo=this.view.getUint32(this.pos,true),hi=this.view.getInt32(this.pos+4,true);this.pos+=8;return[lo,hi]}
  float(){const v=this.view.getFloat32(this.pos,true);this.pos+=4;return v}
  double(){const v=this.view.getFloat64(this.pos,true);this.pos+=8;return v}
  string(){const l=this.view.getUint16(this.pos,true);this.pos+=2;const b=this.buf.subarray(this.pos,this.pos+l);this.pos+=l;return new TextDecoder('utf-8').decode(b)}
  readTag(t){switch(t){case TAG.BYTE:return this.byte();case TAG.SHORT:return this.short();case TAG.INT:return this.int();case TAG.LONG:return this.long();case TAG.FLOAT:return this.float();case TAG.DOUBLE:return this.double();case TAG.BYTE_ARRAY:{const n=this.int(),a=[];for(let i=0;i<n;i++)a.push(this.byte());return a}case TAG.STRING:return this.string();case TAG.LIST:{const et=this.ubyte(),n=this.int(),a=[];for(let i=0;i<n;i++)a.push(this.readTag(et));return a}case TAG.COMPOUND:return this.readCompound();case TAG.INT_ARRAY:{const n=this.int(),a=[];for(let i=0;i<n;i++)a.push(this.int());return a}case TAG.LONG_ARRAY:{const n=this.int(),a=[];for(let i=0;i<n;i++)a.push(this.long());return a}default:throw new Error('Unknown tag '+t)}}
  readCompound(){const o={};while(this.pos<this.buf.length){const t=this.ubyte();if(t===TAG.END)break;const n=this.string();o[n]=this.readTag(t)}return o}
}
function parseBedrockNBT(d){const b=d instanceof Uint8Array?d:new Uint8Array(d),r=new NBTReader(b),t=r.ubyte();if(t!==TAG.COMPOUND)throw new Error('Expected root compound');r.string();return r.readCompound()}
function parseLevelDat(d){const b=d instanceof Uint8Array?d:new Uint8Array(d);return parseBedrockNBT(b.subarray(8))}
window.BedrockNBT={parseBedrockNBT,parseLevelDat};
})();
<\/script>

<!-- AST engine for .mkcd code (MakeCode TypeScript -> acorn -> predicates) -->
<script>
(function(){
'use strict';
const SKIP_KEYS=new Set(['loc','start','end','range','parent','sourceType','raw']);
function walk(n,v){if(!n||typeof n!=='object')return;if(Array.isArray(n)){for(const c of n)walk(c,v);return}if(typeof n.type==='string')v(n);for(const k of Object.keys(n)){if(SKIP_KEYS.has(k))continue;const x=n[k];if(x&&typeof x==='object')walk(x,v)}}
function walkAnc(r,v){function rec(n,st){if(!n||typeof n!=='object')return;if(Array.isArray(n)){for(const c of n)rec(c,st);return}if(typeof n.type==='string')v(n,st);const nx=(typeof n.type==='string')?st.concat([n]):st;for(const k of Object.keys(n)){if(SKIP_KEYS.has(k))continue;const x=n[k];if(x&&typeof x==='object')rec(x,nx)}}rec(r,[])}
function memberName(n){if(!n)return null;if(n.type==='Identifier')return n.name;if(n.type==='MemberExpression'){const o=memberName(n.object),p=n.computed?null:(n.property&&n.property.name);if(!o||!p)return null;return o+'.'+p}return null}
function callName(c){return(c&&c.type==='CallExpression')?memberName(c.callee):null}
function identName(n){return n&&n.type==='Identifier'?n.name:null}
function literalValue(n){if(!n)return undefined;if(n.type==='Literal')return n.value;if(n.type==='TemplateLiteral'&&n.expressions.length===0)return n.quasis.map(q=>q.value.cooked).join('');if(n.type==='UnaryExpression'&&n.operator==='-'&&n.argument.type==='Literal')return -n.argument.value;return undefined}
function staticIter(f){if(f.type!=='ForStatement')return null;const i=f.init,t=f.test,u=f.update;if(!i||!t||!u)return null;let sv=null,vn=null;if(i.type==='VariableDeclaration'&&i.declarations.length===1){const d=i.declarations[0];if(d.id&&d.id.type==='Identifier'&&d.init){vn=d.id.name;const v=literalValue(d.init);if(typeof v==='number')sv=v}}if(vn==null||sv==null)return null;if(t.type!=='BinaryExpression')return null;if(!(t.operator==='<'||t.operator==='<='))return null;if(!(t.left&&t.left.type==='Identifier'&&t.left.name===vn))return null;const ev=literalValue(t.right);if(typeof ev!=='number')return null;let st=null;if(u.type==='UpdateExpression'&&u.operator==='++')st=1;else if(u.type==='AssignmentExpression'&&u.operator==='+='&&literalValue(u.right)===1)st=1;if(st!==1)return null;const it=(t.operator==='<')?(ev-sv):(ev-sv+1);return Math.max(0,it|0)}

function createEngine(src,meta){
  let ast=null,err=null;
  try{ast=acorn.parse(src,{ecmaVersion:'latest',sourceType:'script',locations:true,allowReturnOutsideFunction:true,allowAwaitOutsideFunction:true})}catch(e){err=e}
  const loops=[],chats=[],ids=new Set();
  if(ast){walk(ast,n=>{
    if(n.type==='CallExpression'){const cn=callName(n);if(cn==='player.onChat'&&n.arguments.length>=2){const c=literalValue(n.arguments[0]),f=n.arguments[1];if(typeof c==='string'&&f&&(f.type==='FunctionExpression'||f.type==='ArrowFunctionExpression'))chats.push({name:c,body:f.body,node:n})}}
    if(n.type==='ForStatement'||n.type==='WhileStatement'||n.type==='DoWhileStatement'||n.type==='ForOfStatement'||n.type==='ForInStatement')loops.push(n);
    if(n.type==='Identifier')ids.add(n.name);
  })}
  function callsByName(name){const o=[];if(!ast)return o;walk(ast,n=>{if(n.type==='CallExpression'&&callName(n)===name)o.push(n)});return o}
  function loopDepth(n,d){let m=d;walk(n,c=>{if(c===n)return;if(c.type==='ForStatement'||c.type==='WhileStatement'||c.type==='DoWhileStatement'){const i=loopDepth(c,d+1);if(i>m)m=i}});return m}
  return {
    parsed:!!ast, parseError:err, source:src, meta:meta||{}, ast,
    walk, callName, memberName, literalValue, identName,
    hasChatCommand:n=>chats.some(h=>h.name===n),
    chatCommandNames:()=>chats.map(h=>h.name),
    chatHandler:n=>chats.find(h=>h.name===n)||null,
    callsByName,
    countCalls:n=>callsByName(n).length,
    hasAnyLoop:()=>loops.length>0,
    loopCount:()=>loops.length,
    maxLoopDepth:()=>{let m=0;for(const l of loops){const d=1+loopDepth(l,0);if(d>m)m=d}return m},
    hasLoopWithCalls:(req)=>{for(const l of loops){const inside=new Set();walk(l,n=>{if(n.type==='CallExpression'){const c=callName(n);if(c)inside.add(c)}});if(req.every(c=>inside.has(c)))return true}return false},
    totalAgentForward:()=>{let t=0;walkAnc(ast,(n,st)=>{if(n.type!=='CallExpression'||callName(n)!=='agent.move')return;const d=identName(n.arguments[0]),v=literalValue(n.arguments[1]);if(d!=='FORWARD'||typeof v!=='number')return;let m=1;for(const a of st)if(a.type==='ForStatement'){const k=staticIter(a);if(k!=null)m*=k}t+=v*m});return t},
    callsSetItemMatching:(b)=>{const re=b instanceof RegExp?b:null;for(const c of callsByName('agent.setItem')){const id=identName(c.arguments[0]);if(!id)continue;if(re?re.test(id):id===b)return true}return false},
    setItemBlocks:()=>callsByName('agent.setItem').map(c=>identName(c.arguments[0])).filter(Boolean),
    setsAssist:(f,v)=>{for(const c of callsByName('agent.setAssist')){const fn=identName(c.arguments[0]),vv=literalValue(c.arguments[1]);if(fn===f&&(v===undefined||vv===v))return true}return false},
    spawnsMob:(m)=>{const re=m instanceof RegExp?m:null;for(const c of callsByName('mobs.spawn')){const x=identName(c.arguments[0]);if(!x)continue;if(re?re.test(x):x===m)return true}return false},
    usesIdentifier:(n)=>ids.has(n),
    hasIfStatement:()=>{let h=false;if(ast)walk(ast,n=>{if(n.type==='IfStatement')h=true});return h},
    lineCount:()=>(src||'').split(/\r?\n/).length,
    sourceContains:(s)=>(src||'').indexOf(s)>=0,
  };
}

async function decompressMkcd(uint8){
  return new Promise((res,rej)=>{try{LZMA.decompress(uint8,(r,e)=>{if(e)return rej(e);if(typeof r==='string')return res(r);try{res(new TextDecoder('utf-8').decode(new Uint8Array(r)))}catch(x){rej(x)}})}catch(e){rej(e)}});
}

<script>
(function(){
'use strict';
let results=[],isProcessing=false;
const sessionState={world:null,code:null,worldFile:null,codeFile:null};
const spinnerWrap=document.getElementById('spinnerWrap'),errorMsg=document.getElementById('errorMsg'),resultsSection=document.getElementById('resultsSection'),resultsGrid=document.getElementById('resultsGrid'),modalOverlay=document.getElementById('modalOverlay'),modalContent=document.getElementById('modalContent');
const slotWorld=document.getElementById('slotWorld'),slotCode=document.getElementById('slotCode');
const slotWorldStatus=document.getElementById('slotWorldStatus'),slotCodeStatus=document.getElementById('slotCodeStatus');
const reqBanner=document.getElementById('reqBanner'),reqLabel=document.getElementById('reqLabel'),reqBadges=document.getElementById('reqBadges');

document.getElementById('analyzingText').textContent=UI.analyzing;

function showError(m){errorMsg.textContent=m;errorMsg.style.display='block'}
function hideError(){errorMsg.style.display='none'}
function formatSize(n){return n<1024?n+' B':n<1024*1024?(n/1024).toFixed(1)+' KB':(n/1024/1024).toFixed(2)+' MB'}
function detectKind(f){const n=(f&&f.name||'').toLowerCase();if(n.endsWith('.mcworld'))return 'world';if(n.endsWith('.mkcd'))return 'code';return null}

// Compute which slots this lesson needs (derived from CHECK_REGISTRY targets).
function neededTargets(){
  const s=new Set();
  for(const c of LESSON_CONFIG.checks){const def=CHECK_REGISTRY[c.type];if(def)s.add(def.target||'world')}
  if(!s.size)s.add('world');
  return s;
}

function setupSlots(){
  const need=neededTargets();
  const grid=document.getElementById('dropGrid');
  slotWorld.style.display=need.has('world')?'flex':'none';
  slotCode.style.display=need.has('code')?'flex':'none';
  grid.classList.toggle('dual',need.size===2);
  // Requirements banner
  if(need.size===2){
    reqBanner.style.display='flex';
    reqLabel.textContent=UI.needsBoth||'Esta lección requiere dos archivos:';
    reqBadges.innerHTML='<span class="req-badge">🌍 .mcworld</span><span class="req-badge">💻 .mkcd</span>';
  } else if(need.has('code')){
    reqBanner.style.display='flex';
    reqLabel.textContent=UI.needsCodeOnly||'Esta lección revisa solo el código:';
    reqBadges.innerHTML='<span class="req-badge">💻 .mkcd</span>';
  } else {
    reqBanner.style.display='none';
  }
}

function setSlotStatus(target,state,fileNameOrError){
  const slot=target==='world'?slotWorld:slotCode;
  const status=target==='world'?slotWorldStatus:slotCodeStatus;
  const clearBtn=slot.querySelector('.slot-clear');
  slot.classList.remove('loaded','error');
  if(state==='loaded'){
    slot.classList.add('loaded');
    status.textContent='✓ '+fileNameOrError;
    clearBtn.hidden=false;
  } else if(state==='error'){
    slot.classList.add('error');
    status.textContent='⚠ '+fileNameOrError;
    clearBtn.hidden=true;
  } else {
    status.textContent=target==='world'?(UI.slotWorldEmpty||UI.drop):(UI.slotCodeEmpty||UI.drop);
    clearBtn.hidden=true;
  }
}

function clearSlot(target){
  if(target==='world'){sessionState.world=null;sessionState.worldFile=null}
  else{sessionState.code=null;sessionState.codeFile=null}
  setSlotStatus(target,'empty');
  results=[];renderResults();
}

// Wire each slot
for(const slot of [slotWorld,slotCode]){
  const target=slot.dataset.target;
  const input=slot.querySelector('input[type=file]');
  const clearBtn=slot.querySelector('.slot-clear');
  input.addEventListener('change',e=>{const f=e.target.files[0];if(f)handleSlotFile(target,f);input.value=''});
  slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('dragover')});
  slot.addEventListener('dragleave',()=>slot.classList.remove('dragover'));
  slot.addEventListener('drop',e=>{e.preventDefault();slot.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f){const k=detectKind(f);if(k&&k!==target){const other=k==='world'?slotWorld:slotCode;if(other.style.display!=='none'){handleSlotFile(k,f);return}}handleSlotFile(target,f)}});
  clearBtn.addEventListener('click',e=>{e.stopPropagation();clearSlot(target)});
}

async function handleSlotFile(target,file){
  if(isProcessing)return;
  const k=detectKind(file);
  if(!k){setSlotStatus(target,'error',UI.invalidFile);return}
  if(k!==target){setSlotStatus(target,'error',UI.wrongSlot||UI.invalidFile);return}
  hideError();
  await runChecks([{target,file}]);
}

function renderMcText(t){if(!t)return '';const parts=t.split(/(§[0-9a-fk-or])/gi);let h='',b=false,i=false,o=false,c=null;for(const p of parts){if(/^§([0-9a-f])$/i.test(p)){c=p[1].toLowerCase();continue}if(/^§l$/i.test(p)){b=true;continue}if(/^§o$/i.test(p)){i=true;continue}if(/^§k$/i.test(p)){o=true;continue}if(/^§r$/i.test(p)){b=i=o=false;c=null;continue}if(/^§[mn]$/i.test(p))continue;if(!p.length)continue;const cls=[];if(c)cls.push('mc-'+c);if(b)cls.push('mc-bold');if(i)cls.push('mc-italic');if(o)cls.push('mc-obfuscated');const e=p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');h+=cls.length?'<span class="'+cls.join(' ')+'">'+e+'</span>':e}return h}

async function parseMcworld(file){
  const zip=await JSZip.loadAsync(file);
  let root='';
  for(const p of Object.keys(zip.files)){const l=p.toLowerCase();if(l.endsWith('level.dat')&&!l.includes('__macosx')){root=p.substring(0,p.length-'level.dat'.length);break}}
  const result={metadata:null,npcs:[],thumbnail:null,allEntities:[],signs:[],blockNames:new Set(),blockCounts:{}};
  const ldf=zip.file(root+'level.dat');
  if(ldf){try{const d=await ldf.async('uint8array');result.metadata=window.BedrockNBT.parseLevelDat(d)}catch(e){}}
  for(const s of['world_icon.jpeg','world_icon.jpg','world_icon.png']){const f=zip.file(root+s);if(f){try{const b=await f.async('blob');result.thumbnail=URL.createObjectURL(b)}catch{}break}}
  const dbp=root+'db/',dbf={};
  for(const[p,e]of Object.entries(zip.files)){if(p.startsWith(dbp)&&!e.dir){const n=p.substring(dbp.length);if(n.endsWith('.ldb')||n.endsWith('.sst')||n.endsWith('.log')){try{dbf[n]=await e.async('uint8array')}catch{}}}}
  if(Object.keys(dbf).length){
    try{
      const entries=window.LevelDBReader.readLevelDB(dbf);
      // Pre-compiled byte pattern for "minecraft:" ASCII prefix
      const M=[0x6D,0x69,0x6E,0x65,0x63,0x72,0x61,0x66,0x74,0x3A];
      function isIdByte(b){return (b>=0x61&&b<=0x7A)||(b>=0x30&&b<=0x39)||b===0x5F}
      for(const en of entries){
        try{
          if(en.value.length<=2)continue;
          const v=en.value;
          // Scan raw bytes for "minecraft:<blockname>" patterns. Each subchunk's
          // palette stores block names as ASCII; counting occurrences = approx
          // number of subchunks containing the block.
          if(v.length>=11){
            for(let i=0;i<=v.length-11;i++){
              if(v[i]!==0x6D)continue;
              let match=true;
              for(let j=1;j<10;j++){if(v[i+j]!==M[j]){match=false;break}}
              if(!match)continue;
              let end=i+10;
              while(end<v.length&&isIdByte(v[end]))end++;
              if(end>i+10){
                let name='';
                for(let k=i+10;k<end;k++)name+=String.fromCharCode(v[k]);
                // Skip non-block namespaces (entity:*, item:*, etc.). Heuristic:
                // entities/items also use "minecraft:" prefix but typically have
                // recognizable suffixes. We keep all and let evaluator filter.
                result.blockNames.add(name);
                result.blockCounts[name]=(result.blockCounts[name]||0)+1;
                i=end-1;
              }
            }
          }
          // Parse as NBT for NPCs/signs (existing logic)
          const nbt=window.BedrockNBT.parseBedrockNBT(v);
          if(nbt&&typeof nbt.identifier==='string'){
            const e={identifier:nbt.identifier,RawtextName:nbt.RawtextName||nbt.CustomName||'',CustomName:nbt.CustomName||'',InterativeText:nbt.InterativeText||nbt.InteractiveText||'',Actions:nbt.Actions||'',Variant:nbt.Variant!=null?nbt.Variant:null,Pos:nbt.Pos||null};
            result.allEntities.push(e);
            if(e.identifier==='minecraft:npc')result.npcs.push(e);
          } else if(nbt&&typeof nbt.id==='string'&&(nbt.id==='Sign'||nbt.id==='minecraft:sign')){
            const fulltext=[nbt.FrontText&&nbt.FrontText.Text,nbt.BackText&&nbt.BackText.Text,nbt.Text,nbt.Text1,nbt.Text2,nbt.Text3,nbt.Text4].filter(Boolean).join('\n');
            result.signs.push({text:fulltext,x:nbt.x,y:nbt.y,z:nbt.z});
          }
        }catch{}
      }
    }catch(e){}
  }
  return result;
}

async function parseMkcd(file){
  const buf=new Uint8Array(await file.arrayBuffer());
  const text=await window.MkcdEngine.decompressMkcd(buf);
  const wrapper=JSON.parse(text);
  const source=JSON.parse(wrapper.source);
  const main=source['main.ts']||'';
  return window.MkcdEngine.createEngine(main,{name:wrapper.meta&&wrapper.meta.name||'',files:Object.keys(source),pxt:source['pxt.json']?JSON.parse(source['pxt.json']):null});
}

function evalCheck(check,state){
  const def=CHECK_REGISTRY[check.type];
  if(!def||typeof def.evaluator!=='function')return {passed:false,missing:'unknown'};
  const target=def.target||'world';
  const data=target==='code'?state.code:state.world;
  if(!data)return {passed:false,missing:target};
  try{return {passed:!!def.evaluator(data,check.params||{})}}catch(e){return {passed:false,error:e.message}}
}

async function runChecks(uploads){
  if(isProcessing)return;isProcessing=true;hideError();spinnerWrap.style.display='block';
  try{
    for(const up of uploads){
      try{
        if(up.target==='world'){
          sessionState.world=await parseMcworld(up.file);
          sessionState.worldFile=up.file;
          setSlotStatus('world','loaded',up.file.name+' ('+formatSize(up.file.size)+')');
        } else if(up.target==='code'){
          sessionState.code=await parseMkcd(up.file);
          sessionState.codeFile=up.file;
          setSlotStatus('code','loaded',up.file.name+' ('+formatSize(up.file.size)+')');
        }
      } catch(e){
        setSlotStatus(up.target,'error',e.message||'parse error');
      }
    }

    // Wait until every required target is loaded before scoring (or score partial if user wants)
    const need=neededTargets();
    const haveAll=Array.from(need).every(t=>t==='world'?sessionState.world:sessionState.code);

    const checks={},details={};
    for(const c of LESSON_CONFIG.checks){const r=evalCheck(c,sessionState);checks[c.id]=r.passed;details[c.id]=r}
    const total=LESSON_CONFIG.checks.length;
    const score=LESSON_CONFIG.checks.filter(c=>checks[c.id]).length;
    const entry={id:Date.now()+'-'+Math.random().toString(36).substr(2,6),studentName:UI.student,checks,details,worldData:sessionState.world,codeData:sessionState.code,worldFile:sessionState.worldFile,codeFile:sessionState.codeFile,score,total,partial:!haveAll,timestamp:new Date()};
    results=[entry];renderResults();

    // Only push to LMS once all required files are present
    if(haveAll){
      try{
        const wn=(sessionState.world&&sessionState.world.metadata&&sessionState.world.metadata.LevelName)||'';
        const cn=(sessionState.code&&sessionState.code.meta&&sessionState.code.meta.name)||'';
        window.parent.postMessage({type:'level-save-status',data:{isPassed:score===total,status:score===total?'complete':'attempted'}},'*');
        window.parent.postMessage({type:'level-save-state',data:JSON.stringify({score,total,lessonId:LESSON_CONFIG.id,worldName:wn,codeName:cn})},'*');
      }catch{}
    }
  }catch(e){console.error(e);showError(UI.errorPrefix+' '+e.message)}
  finally{isProcessing=false;spinnerWrap.style.display='none'}
}

function renderResults(){
  if(!results.length){resultsSection.style.display='none';return}
  resultsSection.style.display='block';resultsGrid.innerHTML='';
  for(const r of results){
    const card=document.createElement('div');card.className='card';card.onclick=()=>showModal(r);
    let th;
    if(r.worldData&&r.worldData.thumbnail)th='<img src="'+r.worldData.thumbnail+'" alt="">';
    else if(r.codeData)th='<span style="color:var(--dim);font-size:1.4rem">💻</span>';
    else th='<span style="color:var(--dim)">🌍</span>';
    const dots=LESSON_CONFIG.checks.map(c=>'<span class="dot '+(r.checks[c.id]?'pass':'fail')+'" title="'+esc(c.label)+'"></span>').join('');
    card.innerHTML='<div class="card-thumb">'+th+'</div><div class="card-body"><div class="card-name">'+esc(r.studentName)+'</div><div class="card-lesson">'+esc(LESSON_CONFIG.id)+'</div><div class="card-dots">'+dots+'</div><div class="card-score">'+r.score+'/'+r.total+' '+esc(UI.criteria)+'</div></div>';
    resultsGrid.appendChild(card);
  }
}

function showModal(r){
  const m=r.worldData?r.worldData.metadata:null;
  let h='<button class="modal-close" onclick="document.getElementById(\'modalOverlay\').classList.remove(\'active\')">&times;</button>';
  if(r.worldData&&r.worldData.thumbnail)h+='<img class="modal-thumb" src="'+r.worldData.thumbnail+'" alt="">';
  h+='<h2>'+esc(r.studentName)+'</h2><div class="lesson-tag">'+esc(LESSON_CONFIG.name)+' — '+r.score+'/'+r.total+'</div>';
  if(m){
    h+='<div class="modal-section"><h3>'+esc(UI.worldInfo)+'</h3><div class="meta-grid">';
    h+=mrow(UI.metaName,m.LevelName||UI.empty);
    h+=mrow(UI.metaGamemode,UI.gamemodes[m.GameType]||'?');
    h+=mrow(UI.metaDifficulty,UI.difficulties[m.Difficulty]||(m.Difficulty!=null?m.Difficulty:'?'));
    let sd='?',s=m.RandomSeed;if(Array.isArray(s))sd=s[0]+(s[1]!==0?' (hi:'+s[1]+')':'');else if(s!=null)sd=String(s);
    h+=mrow(UI.metaSeed,sd);h+=mrow(UI.metaEducation,m.educationFeaturesEnabled?UI.yes:UI.no);
    h+='</div></div>';
  }
  if(r.codeData){
    const cd=r.codeData;
    h+='<div class="modal-section"><h3>'+esc(UI.codeInfo||'Code')+'</h3><div class="meta-grid">';
    h+=mrow(UI.codeName||'Project',cd.meta&&cd.meta.name||UI.empty);
    h+=mrow(UI.codeLines||'Lines',cd.lineCount());
    h+=mrow(UI.codeChats||'Chat commands',cd.chatCommandNames().join(', ')||UI.empty);
    h+=mrow(UI.codeLoops||'Loops',cd.loopCount()+' (depth '+cd.maxLoopDepth()+')');
    h+=mrow(UI.codeParse||'Parse',cd.parsed?(UI.yes||'Yes'):'⚠ '+(cd.parseError&&cd.parseError.message||'fail'));
    h+='</div></div>';
  }
  h+='<div class="modal-section"><h3>'+esc(UI.checklist)+'</h3>';
  for(const c of LESSON_CONFIG.checks){
    const p=r.checks[c.id];
    const det=r.details&&r.details[c.id];
    let extra='';
    if(!p&&det&&det.missing==='world')extra='<div class="hint" style="color:var(--yellow)">⚠ '+(UI.needWorld||'Upload .mcworld')+'</div>';
    else if(!p&&det&&det.missing==='code')extra='<div class="hint" style="color:var(--yellow)">⚠ '+(UI.needCode||'Upload .mkcd')+'</div>';
    else if(!p&&det&&det.error)extra='<div class="hint" style="color:var(--red)">⚠ '+esc(det.error)+'</div>';
    h+='<div class="checklist-item"><span class="check-icon '+(p?'pass':'fail')+'">'+(p?'✓':'✗')+'</span><div><div>'+esc(c.label)+'</div>'+(c.hint?'<div class="hint">'+esc(c.hint)+'</div>':'')+extra+'</div></div>';
  }
  h+='</div>';
  if(r.worldData&&r.worldData.npcs.length){
    h+='<div class="modal-section"><h3>'+esc(UI.npcs)+' ('+r.worldData.npcs.length+')</h3>';
    for(const n of r.worldData.npcs){
      const nm=n.RawtextName||n.CustomName||UI.noname;
      const pos=n.Pos?n.Pos.map(p=>typeof p==='number'?p.toFixed(1):p).join(', '):'?';
      h+='<div class="npc-card"><div class="npc-name">'+renderMcText(nm)+'</div><div class="npc-pos">'+esc(UI.pos)+': '+esc(pos)+(n.Variant!=null?' | '+esc(UI.skin)+': '+n.Variant:'')+'</div>';
      if(n.InterativeText)h+='<div class="npc-dialogue">'+renderMcText(n.InterativeText)+'</div>';
      if(n.Actions){try{const a=JSON.parse(n.Actions);if(Array.isArray(a)&&a.length){h+='<div class="npc-buttons">';for(const x of a){h+='<span class="npc-btn-tag" title="'+esc(x.text||x.data||'')+'">'+esc(x.button_name||UI.button)+'</span>'}h+='</div>'}}catch{}}
      h+='</div>';
    }
    h+='</div>';
  }
  if(r.worldData&&r.worldData.allEntities.length){
    const ec={};for(const e of r.worldData.allEntities){ec[e.identifier]=(ec[e.identifier]||0)+1}
    h+='<div class="modal-section"><h3>'+esc(UI.entities)+' ('+r.worldData.allEntities.length+')</h3><div style="font-size:.83rem;color:var(--dim)">'+Object.entries(ec).sort((a,b)=>b[1]-a[1]).map(([i,c])=>esc(i.replace('minecraft:',''))+': '+c).join(' · ')+'</div></div>';
  }
  if(r.codeData&&r.codeData.source){
    const src=r.codeData.source;
    const truncated=src.length>2000?src.substring(0,2000)+'\n…':src;
    h+='<div class="modal-section"><h3>'+esc(UI.codeSource||'main.ts')+'</h3><pre style="background:#0f1422;border-radius:8px;padding:12px;font-family:Consolas,monospace;font-size:.78rem;color:#cbd;max-height:240px;overflow:auto;white-space:pre">'+esc(truncated)+'</pre></div>';
  }
  modalContent.innerHTML=h;modalOverlay.classList.add('active');
}
function mrow(l,v){return '<div class="meta-item"><span>'+esc(l)+':</span> '+esc(String(v))+'</div>'}
function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)modalOverlay.classList.remove('active')});
document.addEventListener('keydown',e=>{if(e.key==='Escape')modalOverlay.classList.remove('active')});

// Init: render slots based on lesson requirements
setupSlots();
setSlotStatus('world','empty');
setSlotStatus('code','empty');

try{window.parent.postMessage({type:'request-level-state'},'*')}catch{}
})();

function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uid(){return 'c'+Date.now().toString(36)+Math.random().toString(36).substr(2,4)}
function toast(msg, type){toastEl.textContent=msg;toastEl.className='toast show '+(type||'');setTimeout(()=>toastEl.classList.remove('show'),2500)}

function resolveLabel(check){
  const def=CHECK_REGISTRY[check.type];
  if(!def)return check.label||check.type;
  if(check.label&&check.label.trim())return check.label;
  return mlFn(def.defaultLabel, check.params||{});
}
function resolveHint(check){
  const def=CHECK_REGISTRY[check.type];
  if(!def)return check.hint||'';
  if(check.hint!=null&&check.hint!=='')return check.hint;
  if(def.defaultHint)return mlFn(def.defaultHint, check.params||{});
  return '';
}

    `;

      card.classList.toggle('open');
    });

      e.stopPropagation();
      currentConfig.checks=currentConfig.checks.filter(c=>c.id!==check.id);
      renderBuilder();renderPreview();
    });
    card.querySelectorAll('[data-field]').forEach(el=>{
      el.addEventListener('input',()=>{

        card.querySelector('.ch-title').textContent=resolveLabel(check);
        renderPreview();
      });
    });
    builderRoot.appendChild(card);

function renderParams(root, check){
  const def=CHECK_REGISTRY[check.type];
  if(!def||!def.params||!def.params.length){
    root.innerHTML='<div class="hint">'+esc(t('builder.noParams'))+'</div>';
    return;
  }
  root.innerHTML='';
  for(let i=0;i<def.params.length;i+=2){
    const row=document.createElement('div');
    row.className='param-row';
    row.appendChild(buildParamField(def.params[i], check));
    if(def.params[i+1])row.appendChild(buildParamField(def.params[i+1], check));
    root.appendChild(row);
  }
}

function buildParamField(p, check){
  const wrap=document.createElement('div');
  wrap.className='field';
  const lbl=document.createElement('label');
  lbl.textContent=ml(p.label);
  wrap.appendChild(lbl);
  let input;
  if(p.type==='select'){
    input=document.createElement('select');
    for(const opt of p.options){
      const o=document.createElement('option');
      o.value=opt.value;o.textContent=ml(opt.label);
      input.appendChild(o);
    }
  } else {
    input=document.createElement('input');
    input.type=p.type==='number'?'number':'text';
    if(p.placeholder)input.placeholder=p.placeholder;
    if(p.min!=null)input.min=p.min;
    if(p.max!=null)input.max=p.max;
  }
  const current=check.params && check.params[p.key]!=null ? check.params[p.key] : p.default;
  input.value=current!=null?current:'';
  input.addEventListener('input',()=>{
    check.params=check.params||{};
    let v=input.value;
    if(p.type==='number')v=v===''?'':Number(v);
    check.params[p.key]=v;
    const card=wrap.closest('.check-card');
    if(card){
      const def=CHECK_REGISTRY[check.type];
      const labelInput=card.querySelector('[data-field=label]');
      const hintInput=card.querySelector('[data-field=hint]');
      if(labelInput){
        const dl=mlFn(def.defaultLabel, check.params);
        labelInput.placeholder=dl;
        const small=labelInput.parentElement.querySelector('small strong');
        if(small)small.textContent=dl;
      }
      if(hintInput&&def.defaultHint){
        const dh=mlFn(def.defaultHint, check.params);
        hintInput.placeholder=dh;
        const small=hintInput.parentElement.querySelector('small strong');
        if(small)small.textContent=dh;
      }
      card.querySelector('.ch-title').textContent=resolveLabel(check);
    }
    renderPreview();
  });
  wrap.appendChild(input);
  return wrap;
}

/* ====================================================================
   PREVIEW
   ==================================================================== */
function renderRequires(){
  const reqEl=document.getElementById('previewRequires');
  if(!reqEl)return;
  const counts={world:0,code:0};
  for(const c of currentConfig.checks){
    const def=CHECK_REGISTRY[c.type];
    if(!def)continue;
    const tg=def.target||'world';
    counts[tg]=(counts[tg]||0)+1;
  }
  const targets=Object.keys(counts).filter(k=>counts[k]>0);
  if(!targets.length){reqEl.style.display='none';return}
  let labelKey='preview.req.world';
  if(targets.length===2)labelKey='preview.req.both';
  else if(targets[0]==='code')labelKey='preview.req.code';
  const badges=targets.map(tg=>{
    const icon=tg==='code'?'💻':'🌍';
    const ext=tg==='code'?'.mkcd':'.mcworld';
    return `<span class="pr-badge ${tg}">${icon} ${ext}<span class="pr-count">×${counts[tg]}</span></span>`;
  }).join('');
  reqEl.innerHTML=`<span class="pr-label">${esc(t(labelKey))}</span>${badges}`;
  reqEl.style.display='flex';
}

function renderPreview(){
  renderRequires();
  if(!currentConfig.checks.length){
    previewRoot.innerHTML='<div style="color:var(--muted);font-size:.82rem;padding:8px 0">'+esc(t('preview.empty'))+'</div>';
    return;
  }
  previewRoot.innerHTML='';
  for(const check of currentConfig.checks){
    const label=resolveLabel(check);
    const hint=resolveHint(check);
    const item=document.createElement('div');
    item.className='preview-item';
    item.innerHTML=`
      <span class="dot"></span>
      <div class="pi-body">
        <div>${esc(label)}</div>
        ${hint?`<div class="pi-hint">${esc(hint)}</div>`:''}
      </div>
    `;
    previewRoot.appendChild(item);
  }
}

function addCheck(typeId){
  const def=CHECK_REGISTRY[typeId];
  if(!def)return;
  const params={};
  if(def.params)for(const p of def.params)params[p.key]=p.default;
  currentConfig.checks.push({id:uid(),type:typeId,params,label:'',hint:''});
  renderBuilder();renderPreview();
  setTimeout(()=>{
    const cards=builderRoot.querySelectorAll('.check-card');
    const last=cards[cards.length-1];
    if(last){last.classList.add('open');last.scrollIntoView({behavior:'smooth',block:'center'})}
  },10);
}

  currentConfig.id=lessonIdEl.value.trim()||'NEW';
  currentConfig.name=lessonNameEl.value.trim()||t('field.lessonName.default');
  currentConfig.intro=lessonIntroEl.value.trim()||t('field.lessonIntro.default');

function loadConfig(cfg){
  currentConfig=JSON.parse(JSON.stringify(cfg));
  if(typeof currentConfig.name==='object')currentConfig.name=ml(currentConfig.name);
  if(typeof currentConfig.intro==='object')currentConfig.intro=ml(currentConfig.intro);
  if(!currentConfig.name)currentConfig.name=t('field.lessonName.default');
  if(!currentConfig.intro)currentConfig.intro=t('field.lessonIntro.default');
  currentConfig.checks=(currentConfig.checks||[]).map(c=>({id:c.id||uid(),type:c.type,params:c.params||{},label:c.label||'',hint:c.hint||''}));
  lessonIdEl.value=currentConfig.id||'';
  lessonNameEl.value=currentConfig.name;lessonNameEl.dataset.autoset='';
  lessonIntroEl.value=currentConfig.intro;lessonIntroEl.dataset.autoset='';
  renderBuilder();renderPreview();
}

/* ====================================================================
   SERIALIZATION & EXPORT
   ==================================================================== */
function serializeRegistry(){
  // Only evaluator is needed in exported checker — labels are frozen into config
  const parts=[];
  for(const [id,def] of Object.entries(CHECK_REGISTRY)){
    const target=def.target||'world';
    parts.push(`CHECK_REGISTRY[${JSON.stringify(id)}] = { target: ${JSON.stringify(target)}, evaluator: ${def.evaluator.toString()} };`);
  }
  return parts.join('\n');
}

function buildCheckerHTML(){
  syncMetaFromInputs();
  const frozen={
    id: currentConfig.id,
    name: currentConfig.name,
    intro: currentConfig.intro,
    checks: currentConfig.checks.map(c=>({
      id: c.id,
      type: c.type,
      params: c.params||{},
      label: resolveLabel(c),
      hint: resolveHint(c)
    }))
  };
  const ui = CHECKER_UI[currentLang]||CHECKER_UI.es;
  // unescape the backslash used in template to prevent premature tag close
  const tpl=document.getElementById('checkerTemplate').textContent.replaceAll('<\\/script>','<\/script>');
  return tpl
    .replaceAll('__LANG__', currentLang)
    .replaceAll('__LESSON_NAME__', escHtml(frozen.name))
    .replaceAll('__LESSON_INTRO__', escHtml(frozen.intro))
    .replaceAll('__DROP_TEXT__', ui.drop)
    .replaceAll('__ANALYZING__', escHtml(ui.analyzing))
    .replaceAll('__SLOT_WORLD_TITLE__', escHtml(ui.slotWorldTitle||'World file'))
    .replaceAll('__SLOT_WORLD_EMPTY__', escHtml(ui.slotWorldEmpty||ui.drop))
    .replaceAll('__SLOT_CODE_TITLE__', escHtml(ui.slotCodeTitle||'Code project'))
    .replaceAll('__SLOT_CODE_EMPTY__', escHtml(ui.slotCodeEmpty||ui.drop))
    .replace('__LESSON_CONFIG__', JSON.stringify(frozen))
    .replace('__UI_STRINGS__', JSON.stringify(ui))
    .replace('__REGISTRY_SRC__', serializeRegistry());
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function exportZip(){
  if(!currentConfig.checks.length){toast(t('toast.empty'),'error');return}
  syncMetaFromInputs();
  try{
    const html=buildCheckerHTML();
    const zip=new JSZip();
    zip.file('index.html', html);
    const blob=await zip.generateAsync({type:'blob'});
    downloadBlob(blob, `${currentConfig.id||'lesson'}_checker.zip`);
    toast(t('toast.zipOk'),'success');
  }catch(e){console.error(e);toast(t('toast.exportError')+e.message,'error')}
}

function exportJson(){
  syncMetaFromInputs();
  const out={...currentConfig, _lang: currentLang};
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  downloadBlob(blob, `${currentConfig.id||'lesson'}_config.json`);
  toast(t('toast.jsonOk'),'success');
}

function downloadBlob(blob, name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},100);
}

function importJson(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const cfg=JSON.parse(r.result);
      if(!cfg.checks||!Array.isArray(cfg.checks))throw new Error(t('toast.invalidFormat'));
      const unknown=cfg.checks.filter(c=>!CHECK_REGISTRY[c.type]);
      if(unknown.length)toast(t('toast.unknownTypes',{n:unknown.length}),'error');
      loadConfig(cfg);
      toast(t('toast.loaded'),'success');
    }catch(e){toast(t('toast.importError')+e.message,'error')}
  };
  r.readAsText(file);
}

function showPresetMenu(){
  const names=Object.keys(PRESETS);
  const choice=prompt(t('prompt.preset',{options:names.join('\n')}), names[0]);
  if(!choice)return;
  const preset=PRESETS[choice.trim()];
  if(!preset){toast(t('toast.presetNotFound'),'error');return}
  if(currentConfig.checks.length && !confirm(t('confirm.overwrite')))return;
  const cfg={
    id: preset.id,
    name: typeof preset.name==='object'?ml(preset.name):preset.name,
    intro: preset.intro?(typeof preset.intro==='object'?ml(preset.intro):preset.intro):t('field.lessonIntro.default'),
    checks: preset.checks.map(c=>({id:uid(),type:c.type,params:{...c.params},label:'',hint:''}))
  };
  loadConfig(cfg);
  toast(t('toast.presetLoaded',{name:choice}),'success');
}

function setLang(lang){
  if(!I18N[lang])return;
  currentLang=lang;

/* ====================================================================
   ONBOARDING TOUR
   ==================================================================== */
const TOUR_STEPS = [
  {key:'s1', target:null, position:'center'},
  {key:'s2', target:'#field-lessonId', position:'bottom'},
  {key:'s3', target:'#field-lessonName', position:'bottom'},
  {key:'s4', target:'#field-lessonIntro', position:'bottom'},
  {key:'s5', target:'.pane-catalog', position:'right'},
  {key:'s6', target:'.pane-builder', position:'left'},
  {key:'s7', target:'#previewBanner', position:'top'},
  {key:'s8', target:'#btnLoadPreset', position:'bottom'},
  {key:'s9', target:'#btnExportJson', position:'bottom'},
  {key:'s10', target:'#btnExportZip', position:'bottom'},
  {key:'s11', target:null, position:'center'}
];

const tourState = {active:false, idx:0};
const tourBackdrop = document.getElementById('tourBackdrop');
const tourSpotlight = document.getElementById('tourSpotlight');
const tourPopover = document.getElementById('tourPopover');
const tourTitleEl = document.getElementById('tourTitle');
const tourBodyEl = document.getElementById('tourBody');
const tourCounterEl = document.getElementById('tourCounter');
const tourSkipBtn = document.getElementById('tourSkip');
const tourPrevBtn = document.getElementById('tourPrev');
const tourNextBtn = document.getElementById('tourNext');

function tourStart(){
  tourState.active = true;
  tourState.idx = 0;
  tourScrollTarget();
  tourRender();
}
function tourEnd(){
  tourState.active = false;
  tourBackdrop.classList.remove('active');
  tourSpotlight.style.display='none';
  tourPopover.style.display='none';
  localStorage.setItem('mcb_tour_done','1');
}
function tourGo(delta){
  const next = tourState.idx + delta;
  if(next < 0) return;
  if(next >= TOUR_STEPS.length){ tourEnd(); return; }
  tourState.idx = next;
  tourScrollTarget();
  tourRender();
}
function tourScrollTarget(){
  const step = TOUR_STEPS[tourState.idx];
  if(!step.target) return;
  const el = document.querySelector(step.target);
  if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
}
function tourRender(){
  if(!tourState.active) return;
  const step = TOUR_STEPS[tourState.idx];
  tourTitleEl.textContent = t('tour.'+step.key+'.title');
  let body = t('tour.'+step.key+'.body');
  body = body.replace('{ID}', currentConfig.id||'M1L3');
  tourBodyEl.textContent = body;
  tourCounterEl.textContent = t('tour.counter', {n:tourState.idx+1, total:TOUR_STEPS.length});
  tourSkipBtn.textContent = t('tour.skip');
  tourPrevBtn.textContent = t('tour.prev');
  tourPrevBtn.style.visibility = tourState.idx===0 ? 'hidden' : 'visible';
  tourNextBtn.textContent = tourState.idx===TOUR_STEPS.length-1 ? t('tour.finish') : t('tour.next');

  const vw = window.innerWidth, vh = window.innerHeight;
  const margin = 12;

  if(step.target){
    const el = document.querySelector(step.target);
    if(el){
      // Spotlight is interactive: backdrop is dimmed only via spotlight box-shadow, no pane blocks clicks.
      tourBackdrop.classList.remove('active');
      const r = el.getBoundingClientRect();
      const pad = 8;
      tourSpotlight.style.display='block';
      tourSpotlight.style.left = (r.left - pad) + 'px';
      tourSpotlight.style.top = (r.top - pad) + 'px';
      tourSpotlight.style.width = (r.width + pad*2) + 'px';
      tourSpotlight.style.height = (r.height + pad*2) + 'px';
      tourSpotlight.classList.add('tour-pulse');

      // Render popover offscreen first to measure its real height
      tourPopover.style.transform='none';
      tourPopover.style.display='block';
      tourPopover.className = 'tour-popover';
      tourPopover.style.left='-9999px';
      tourPopover.style.top='0px';
      const popW = tourPopover.offsetWidth || 340;
      const popH = tourPopover.offsetHeight || 200;

      let px, py, arrowClass='';
      const fits = {
        bottom: r.bottom + 16 + popH < vh - margin,
        top: r.top - 16 - popH > margin,
        right: r.right + 16 + popW < vw - margin,
        left: r.left - 16 - popW > margin
      };
      // Pick the requested position if it fits, otherwise pick the first one that fits
      const order = [step.position, 'bottom', 'top', 'right', 'left'];
      const pick = order.find(p => fits[p]) || step.position || 'bottom';

      if(pick==='bottom'){
        py = r.bottom + 16;
        px = Math.max(margin, Math.min(r.left, vw - popW - margin));
        arrowClass='arrow-top';
      } else if(pick==='top'){
        py = r.top - popH - 16;
        px = Math.max(margin, Math.min(r.left, vw - popW - margin));
        arrowClass='arrow-bottom';
      } else if(pick==='right'){
        px = r.right + 16;
        py = Math.max(margin, Math.min(r.top, vh - popH - margin));
        arrowClass='arrow-left';
      } else if(pick==='left'){
        px = r.left - popW - 16;
        py = Math.max(margin, Math.min(r.top, vh - popH - margin));
        arrowClass='arrow-right';
      }
      // Hard clamp to viewport — popover must always stay fully visible
      px = Math.max(margin, Math.min(px, vw - popW - margin));
      py = Math.max(margin, Math.min(py, vh - popH - margin));
      tourPopover.style.left = px + 'px';
      tourPopover.style.top = py + 'px';
      tourPopover.className = 'tour-popover ' + arrowClass;
    } else {
      // Target not in DOM — fall back to center
      tourBackdrop.classList.add('active');
      tourSpotlight.style.display='none';
      tourPopover.style.display='block';
      tourPopover.className = 'tour-popover';
      tourPopover.style.left = '50%';
      tourPopover.style.top = '50%';
      tourPopover.style.transform = 'translate(-50%,-50%)';
      return;
    }
  } else {
    // Centered popover (welcome + finish steps) — full backdrop dim
    tourBackdrop.classList.add('active');
    tourSpotlight.style.display='none';
    tourPopover.style.display='block';
    tourPopover.className = 'tour-popover';
    tourPopover.style.left = '50%';
    tourPopover.style.top = '50%';
    tourPopover.style.transform = 'translate(-50%,-50%)';
    return;
  }
  tourPopover.style.transform = 'none';
}

tourSkipBtn.addEventListener('click', tourEnd);
tourPrevBtn.addEventListener('click', () => tourGo(-1));
tourNextBtn.addEventListener('click', () => tourGo(1));
document.getElementById('btnTour').addEventListener('click', tourStart);
document.addEventListener('keydown', e => {
  if(!tourState.active) return;
  if(e.key === 'Escape'){ tourEnd(); return; }
  // Don't intercept arrows / Enter when typing — let user write freely
  const tag = (e.target.tagName||'').toLowerCase();
  const editable = tag==='input' || tag==='textarea' || tag==='select' || e.target.isContentEditable;
  if(editable) return;
  if(e.key === 'ArrowRight' || e.key === 'Enter') tourGo(1);
  else if(e.key === 'ArrowLeft') tourGo(-1);
});
window.addEventListener('resize', () => { if(tourState.active) tourRender(); });
window.addEventListener('scroll', () => { if(tourState.active) tourRender(); }, {passive:true, capture:true});

[lessonIdEl,lessonNameEl,lessonIntroEl].forEach(el=>{

const HELP_RECIPES = [
  { icon:'🌍', titleKey:'help.recipe.world', tagKey:'help.recipe.world.tag',
    checks:['world.valid','world.named','world.gamemode_is','world.seed_set'] },
  { icon:'👤', titleKey:'help.recipe.npc', tagKey:'help.recipe.npc.tag',
    checks:['npc.min_count','npc.all_named','npc.all_have_dialogue','npc.uses_format_codes'] },
  { icon:'🏰', titleKey:'help.recipe.structure', tagKey:'help.recipe.structure.tag',
    checks:['world.valid','world.named','npc.min_count','sign.min_count','entity.unique_types_min'] },
  { icon:'🤖', titleKey:'help.recipe.code', tagKey:'help.recipe.code.tag',
    checks:['code.valid','code.chat_command','code.has_loop','code.loop_contains','code.total_forward_min'] },
  { icon:'🎯', titleKey:'help.recipe.hybrid', tagKey:'help.recipe.hybrid.tag',
    checks:['world.valid','world.named','entity.min_count_of','code.chat_command','code.nested_loops','code.uses_block'] },
];

const helpOverlay = document.getElementById('helpOverlay');
const helpBody = document.getElementById('helpBody');

function buildHelpHTML(){
  const t1=t('help.section.recipes'), t2=t('help.section.files'), t3=t('help.section.all');
  let h='';

  // Section 1: recipes
  h+=`<div class="help-section"><h3>${esc(t1)}</h3><div class="recipes-grid">`;
  for(const r of HELP_RECIPES){
    const checks=r.checks.map(id=>{
      const def=CHECK_REGISTRY[id];
      const tg=def?(def.target||'world'):'world';
      return `<div><span class="rc-tag ${tg}">${tg==='code'?'💻':'🌍'}</span>${id}</div>`;
    }).join('');
    h+=`
      <div class="recipe-card">
        <div class="recipe-head">
          <span class="recipe-icon">${r.icon}</span>
          <span class="recipe-title">${esc(t(r.titleKey))}</span>
          <span class="recipe-tag">${esc(t(r.tagKey))}</span>
        </div>
        <div class="recipe-checks">${checks}</div>
      </div>`;
  }
  h+=`</div></div>`;

  // Section 2: file diagram
  const worldCount=Object.values(CHECK_REGISTRY).filter(d=>(d.target||'world')==='world').length;
  const codeCount =Object.values(CHECK_REGISTRY).filter(d=>(d.target||'world')==='code').length;
  h+=`
    <div class="help-section">
      <h3>${esc(t2)}</h3>
      <div class="file-diagram">
        <div class="file-card world">
          <div class="fc-icon">🌍</div>
          <div class="fc-ext">.mcworld</div>
          <div class="fc-title">${esc(t('help.file.world.title'))}</div>
          <div class="fc-desc">${esc(t('help.file.world.desc'))}</div>
          <div class="fc-count">${esc(t('help.file.checks',{n:worldCount}))}</div>
        </div>
        <div class="file-card code">
          <div class="fc-icon">💻</div>
          <div class="fc-ext">.mkcd</div>
          <div class="fc-title">${esc(t('help.file.code.title'))}</div>
          <div class="fc-desc">${esc(t('help.file.code.desc'))}</div>
          <div class="fc-count">${esc(t('help.file.checks',{n:codeCount}))}</div>
        </div>
      </div>
    </div>`;

  // Section 3: all checks list
  h+=`<div class="help-section"><h3>${esc(t3)}</h3>`;
  for(const cat of CATEGORIES){
    const items=Object.entries(CHECK_REGISTRY).filter(([,d])=>d.category===cat.id);
    if(!items.length)continue;
    h+=`<div class="checks-list-cat"><h4>${cat.icon} ${esc(t('cat.'+cat.id))} (${items.length})</h4><div class="checks-list-rows">`;
    for(const [id,def] of items){
      h+=`<div class="check-row">
        <span class="cr-mark">✓</span>
        <span class="cr-id">${esc(id)}</span>
        <span class="cr-desc">${esc(ml(def.label))}. ${esc(ml(def.description))}</span>
      </div>`;
    }
    h+=`</div></div>`;
  }
  h+=`</div>`;

  return h;
}

function openHelp(){
  helpBody.innerHTML=buildHelpHTML();
  document.getElementById('helpTitle').textContent=t('help.title');
  helpOverlay.classList.add('active');
}
